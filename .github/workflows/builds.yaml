---
name: builds
on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  BuildTestAndCheck:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      # Step 1: Checkout the repo
      - name: checkout-module
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: Brownserve.PuppetPSTools
      # Step 2: Run the build script
      - name: run-build-script
        shell: pwsh
        run: |
            ./Brownserve.PuppetPSTools/.build/build.ps1 `
              -GitHubRepoName 'Brownserve.PuppetPSTools' `
              -BranchName $env:GITHUB_REF `
              -Build 'BuildTestAndCheck' `
              -Verbose
